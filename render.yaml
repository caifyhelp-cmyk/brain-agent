services:
  - type: web
    name: brain-agent
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OWNER_PIN
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: brain-agent-db
          property: connectionString
      - key: CAIFY_API_BASE
        sync: false
      - key: CAIFY_API_TOKEN
        sync: false

databases:
  - name: brain-agent-db
    plan: free

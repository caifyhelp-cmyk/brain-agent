<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>뇌 에이전트 — 포스팅 검토</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f13; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

nav { background: #1a1a24; border-bottom: 1px solid #2a2a3a; padding: 0 24px; display: flex; align-items: center; gap: 24px; height: 52px; flex-shrink: 0; }
nav .logo { font-weight: 700; font-size: 15px; color: #fff; }
nav a { color: #888; text-decoration: none; font-size: 13px; padding: 4px 0; border-bottom: 2px solid transparent; transition: color 0.15s; white-space: nowrap; }
nav a:hover { color: #fff; }
nav a.active { color: #fff; border-bottom-color: #03c75a; }
nav .badge { background: #ff6b6b; color: #fff; font-size: 10px; font-weight: 700; padding: 2px 5px; border-radius: 10px; margin-left: 4px; }
nav .post-badge { background: #03c75a; }

.workspace { display: grid; grid-template-columns: 260px 1fr 340px; flex: 1; overflow: hidden; }

/* ── 왼쪽: 포스트 목록 ── */
.sidebar { border-right: 1px solid #2a2a3a; overflow-y: auto; display: flex; flex-direction: column; }
.sidebar-header { padding: 16px; border-bottom: 1px solid #2a2a3a; display: flex; align-items: center; justify-content: space-between; }
.sidebar-header h3 { font-size: 12px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.6px; }
.reload-btn { background: none; border: none; color: #555; cursor: pointer; font-size: 16px; padding: 2px 6px; border-radius: 4px; transition: color 0.15s; }
.reload-btn:hover { color: #fff; }

.post-item { padding: 14px 16px; border-bottom: 1px solid #1f1f2e; cursor: pointer; transition: background 0.12s; }
.post-item:hover { background: #1f1f2a; }
.post-item.active { background: #1a2a1a; border-left: 3px solid #03c75a; }
.post-item .post-title { font-size: 13px; color: #ddd; line-height: 1.4; margin-bottom: 6px; word-break: keep-all; }
.post-item .post-meta { display: flex; align-items: center; gap: 6px; }
.status-badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 10px; }
.status-0 { background: #ff6b6b22; color: #ff6b6b; }
.status-1 { background: #f0a50022; color: #f0a500; }
.post-date { font-size: 11px; color: #555; }
.empty-list { padding: 40px 16px; text-align: center; color: #444; font-size: 13px; }

/* ── 가운데: 포스트 내용 ── */
.content-panel { overflow-y: auto; display: flex; flex-direction: column; }
.content-header { padding: 16px 20px; border-bottom: 1px solid #2a2a3a; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.content-title-input { flex: 1; background: #1a1a24; border: 1px solid #2a2a3a; border-radius: 6px; color: #fff; padding: 8px 12px; font-size: 14px; font-weight: 600; }
.content-title-input:focus { outline: none; border-color: #03c75a44; }
.save-btn { background: #1a2a1a; color: #03c75a; border: 1px solid #03c75a33; border-radius: 6px; padding: 8px 14px; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: all 0.15s; }
.save-btn:hover { background: #2a3a2a; }
.save-btn:disabled { opacity: 0.4; cursor: not-allowed; }

.html-editor { flex: 1; display: flex; flex-direction: column; }
.editor-tabs { display: flex; border-bottom: 1px solid #2a2a3a; padding: 0 20px; }
.tab-btn { background: none; border: none; color: #666; font-size: 12px; padding: 8px 14px; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; }
.tab-btn.active { color: #fff; border-bottom-color: #03c75a; }
.tab-pane { display: none; flex: 1; overflow: auto; }
.tab-pane.active { display: flex; flex-direction: column; flex: 1; }

#preview-pane { padding: 20px; }
#preview-pane .preview-content { background: #fff; border-radius: 8px; padding: 24px; color: #333; font-size: 14px; line-height: 1.8; min-height: 200px; }
#preview-pane .preview-content h1, #preview-pane .preview-content h2 { margin: 16px 0 8px; }
#preview-pane .preview-content p { margin-bottom: 12px; }

#html-pane textarea { flex: 1; background: #0f0f13; border: none; color: #a8d8a8; font-family: 'Fira Code', 'Consolas', monospace; font-size: 12px; padding: 20px; resize: none; width: 100%; min-height: 400px; outline: none; }

.action-bar { padding: 14px 20px; border-top: 1px solid #2a2a3a; display: flex; gap: 10px; flex-shrink: 0; background: #0f0f13; }
.btn-approve { background: #03c75a; color: #fff; border: none; border-radius: 8px; padding: 10px 24px; font-size: 14px; font-weight: 700; cursor: pointer; transition: background 0.15s; }
.btn-approve:hover { background: #02a84c; }
.btn-approve:disabled { background: #1a3a1a; color: #555; cursor: not-allowed; }
.btn-reject { background: #2a1a1a; color: #ff6b6b; border: 1px solid #ff6b6b33; border-radius: 8px; padding: 10px 20px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
.btn-reject:hover { background: #3a2a2a; }
.placeholder { flex: 1; display: flex; align-items: center; justify-content: center; color: #333; font-size: 14px; }

/* ── 오른쪽: AI 패널 ── */
.ai-panel { border-left: 1px solid #2a2a3a; display: flex; flex-direction: column; overflow: hidden; }
.ai-tabs { display: flex; border-bottom: 1px solid #2a2a3a; flex-shrink: 0; }
.ai-tab { flex: 1; background: none; border: none; color: #666; font-size: 12px; padding: 10px; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; }
.ai-tab.active { color: #fff; border-bottom-color: #6c63ff; }

/* 분석 탭 */
#ai-analyze { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
.analyze-btn { background: #6c63ff22; color: #9c93ff; border: 1px solid #6c63ff44; border-radius: 8px; padding: 10px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; width: 100%; }
.analyze-btn:hover { background: #6c63ff44; }
.analyze-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.analysis-output { background: #1a1a24; border: 1px solid #2a2a3a; border-radius: 8px; padding: 14px; font-size: 13px; color: #ccc; line-height: 1.7; white-space: pre-wrap; min-height: 80px; }
.analysis-output.streaming::after { content: '▌'; animation: blink 0.7s infinite; color: #6c63ff; }
@keyframes blink { 50% { opacity: 0; } }

/* 대화 탭 */
#ai-chat { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.chat-messages { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 10px; }
.chat-msg { max-width: 90%; }
.chat-msg.user { align-self: flex-end; }
.chat-msg.assistant { align-self: flex-start; }
.msg-bubble { padding: 10px 14px; border-radius: 12px; font-size: 13px; line-height: 1.6; white-space: pre-wrap; }
.user .msg-bubble { background: #1a2a3a; color: #b0d4f0; border-bottom-right-radius: 4px; }
.assistant .msg-bubble { background: #1a1a24; color: #ddd; border-bottom-left-radius: 4px; border: 1px solid #2a2a3a; }
.assistant .msg-bubble.streaming::after { content: '▌'; animation: blink 0.7s infinite; color: #6c63ff; }

.msg-bubble code { background: #0f0f1a; border-radius: 4px; padding: 2px 6px; font-family: monospace; font-size: 11px; }
.msg-bubble pre { background: #0a0a14; border-radius: 6px; padding: 10px; overflow-x: auto; margin: 6px 0; font-size: 11px; }
.apply-html-btn { margin-top: 8px; background: #1a2a1a; color: #03c75a; border: 1px solid #03c75a44; border-radius: 6px; padding: 6px 12px; font-size: 11px; cursor: pointer; display: none; }
.apply-html-btn:hover { background: #2a3a2a; }

.chat-input-row { padding: 10px 12px; border-top: 1px solid #2a2a3a; display: flex; gap: 8px; flex-shrink: 0; }
.chat-input { flex: 1; background: #1a1a24; border: 1px solid #2a2a3a; border-radius: 8px; color: #ddd; padding: 8px 12px; font-size: 13px; resize: none; min-height: 36px; max-height: 100px; font-family: inherit; }
.chat-input:focus { outline: none; border-color: #6c63ff44; }
.chat-send { background: #6c63ff; color: #fff; border: none; border-radius: 8px; padding: 8px 14px; font-size: 13px; cursor: pointer; font-weight: 600; transition: background 0.15s; align-self: flex-end; }
.chat-send:hover { background: #7c73ff; }
.chat-send:disabled { background: #2a2a3a; color: #666; cursor: not-allowed; }
.no-post { display: flex; align-items: center; justify-content: center; flex: 1; color: #333; font-size: 13px; }

#toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1e1e2e; color: #fff; padding: 12px 24px; border-radius: 8px; font-size: 13px; display: none; z-index: 999; border: 1px solid #3a3a5a; }
</style>
</head>
<body>
<nav>
  <span class="logo">🧠 뇌 에이전트</span>
  <a href="/">대시보드</a>
  <a href="/grow">뇌 성장</a>
  <a href="/chat">대화</a>
  <a href="/logs">로그</a>
  <a href="/review">패턴 검토{% if pending > 0 %}<span class="badge">{{ pending }}</span>{% endif %}</a>
  <a href="/patterns">패턴</a>
  <a href="/posts" class="active">포스팅 검토<span class="badge post-badge" id="post-count-badge" style="display:none"></span></a>
  <a href="/mine" style="color:#e8b84b;">마이닝</a>
  <a href="/ask" style="color:#51cf66;">판단 요청</a>
</nav>

<div class="workspace">
  <!-- ── 왼쪽: 포스트 목록 ── -->
  <div class="sidebar">
    <div class="sidebar-header">
      <h3>발행 대기</h3>
      <button class="reload-btn" onclick="loadPosts()" title="새로고침">↺</button>
    </div>
    <div id="post-list"><div class="empty-list">불러오는 중...</div></div>
  </div>

  <!-- ── 가운데: 포스트 내용 ── -->
  <div class="content-panel" id="content-panel">
    <div class="placeholder">← 포스트를 선택하세요</div>
  </div>

  <!-- ── 오른쪽: AI 패널 ── -->
  <div class="ai-panel">
    <div class="ai-tabs">
      <button class="ai-tab active" onclick="switchAiTab('analyze', this)">AI 분석</button>
      <button class="ai-tab" onclick="switchAiTab('chat', this)">대화형 수정</button>
    </div>
    <div id="ai-analyze" style="display:flex; flex-direction:column; gap:12px; padding:16px; overflow-y:auto; flex:1;">
      <div class="no-post">포스트를 선택하면<br>분석이 시작됩니다</div>
    </div>
    <div id="ai-chat" style="display:none; flex-direction:column; flex:1; overflow:hidden;">
      <div class="chat-messages" id="chat-messages">
        <div class="no-post" style="flex:1; display:flex; align-items:center; justify-content:center;">포스트를 먼저 선택하세요</div>
      </div>
      <div class="chat-input-row">
        <textarea class="chat-input" id="chat-input" placeholder="수정 요청을 입력하세요... (예: 2단락을 더 자연스럽게 바꿔줘)" rows="2" onkeydown="chatKeydown(event)"></textarea>
        <button class="chat-send" id="chat-send" onclick="sendChat()" disabled>전송</button>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
let posts = [];
let currentPost = null;
let chatHistory = [];
let isStreaming = false;

// ── 포스트 목록 로드 ──────────────────────────────────────
async function loadPosts() {
  document.getElementById('post-list').innerHTML = '<div class="empty-list">불러오는 중...</div>';
  const res = await fetch('/api/posts/list');
  const data = await res.json();
  if (!data.ok) {
    document.getElementById('post-list').innerHTML = `<div class="empty-list" style="color:#ff6b6b">${data.error}</div>`;
    return;
  }
  posts = data.posts || [];
  renderPostList();

  const badge = document.getElementById('post-count-badge');
  if (posts.length > 0) {
    badge.textContent = posts.length;
    badge.style.display = '';
  } else {
    badge.style.display = 'none';
  }
}

function renderPostList() {
  const el = document.getElementById('post-list');
  if (!posts.length) {
    el.innerHTML = '<div class="empty-list">발행 대기 포스트 없음</div>';
    return;
  }
  el.innerHTML = posts.map(p => `
    <div class="post-item ${currentPost?.id === p.id ? 'active' : ''}" onclick="selectPost(${p.id})">
      <div class="post-title">${escHtml(p.title || '(제목 없음)')}</div>
      <div class="post-meta">
        <span class="status-badge status-${p.status}">${p.status === 0 ? '미승인' : '검토 대기'}</span>
        <span class="post-date">${(p.created_at || '').substring(0, 10)}</span>
      </div>
    </div>
  `).join('');
}

// ── 포스트 선택 ───────────────────────────────────────────
function selectPost(id) {
  currentPost = posts.find(p => p.id === id);
  if (!currentPost) return;
  chatHistory = [];
  renderPostList();
  renderContent();
  renderAnalyzePanel();
  document.getElementById('chat-messages').innerHTML = '';
  document.getElementById('chat-send').disabled = false;
}

function renderContent() {
  const p = currentPost;
  document.getElementById('content-panel').innerHTML = `
    <div class="content-header">
      <input class="content-title-input" id="title-input" value="${escAttr(p.title || '')}" placeholder="제목">
      <button class="save-btn" id="save-btn" onclick="saveContent()">저장</button>
    </div>
    <div class="html-editor">
      <div class="editor-tabs">
        <button class="tab-btn active" onclick="switchTab('preview', this)">미리보기</button>
        <button class="tab-btn" onclick="switchTab('html', this)">HTML 편집</button>
      </div>
      <div class="tab-pane active" id="preview-pane">
        <div class="preview-content" id="preview-content">${p.html || p.naver_html || '<p style="color:#888">본문 없음</p>'}</div>
      </div>
      <div class="tab-pane" id="html-pane">
        <textarea id="html-input" oninput="syncPreview()">${escHtml(p.html || p.naver_html || '')}</textarea>
      </div>
    </div>
    <div class="action-bar">
      <button class="btn-approve" onclick="approvePost()">✅ 발행 승인</button>
      <button class="btn-reject" onclick="rejectPost()">❌ 반려</button>
    </div>
  `;
}

function syncPreview() {
  const html = document.getElementById('html-input')?.value || '';
  const preview = document.getElementById('preview-content');
  if (preview) preview.innerHTML = html;
  if (currentPost) currentPost._editedHtml = html;
}

function switchTab(name, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(name + '-pane').classList.add('active');
}

// ── 저장 ─────────────────────────────────────────────────
async function saveContent() {
  if (!currentPost) return;
  const title = document.getElementById('title-input').value;
  const html  = document.getElementById('html-input')?.value || currentPost.html || '';
  const btn   = document.getElementById('save-btn');
  btn.disabled = true; btn.textContent = '저장 중...';

  const res = await fetch(`/api/posts/${currentPost.id}/update`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({title, html})
  });
  const data = await res.json();
  btn.disabled = false; btn.textContent = '저장';

  if (data.ok) {
    currentPost.title = title;
    currentPost.html  = html;
    toast('저장 완료');
  } else {
    toast('저장 실패: ' + data.error, true);
  }
}

// ── 승인 / 반려 ───────────────────────────────────────────
async function approvePost() {
  if (!currentPost) return;
  if (!confirm(`"${currentPost.title}" 발행 승인하시겠습니까?\n\nFlutter/Electron 앱이 네이버에 자동 발행합니다.`)) return;

  const res = await fetch(`/api/posts/${currentPost.id}/approve`, {method: 'POST'});
  const data = await res.json();
  if (data.ok) {
    toast('발행 승인 완료 — 앱에서 자동 발행됩니다');
    posts = posts.filter(p => p.id !== currentPost.id);
    currentPost = null;
    renderPostList();
    document.getElementById('content-panel').innerHTML = '<div class="placeholder">← 포스트를 선택하세요</div>';
    renderAnalyzePanel();
  } else {
    toast('승인 실패: ' + data.error, true);
  }
}

async function rejectPost() {
  if (!currentPost) return;
  if (!confirm(`"${currentPost.title}" 반려하시겠습니까?`)) return;

  const res = await fetch(`/api/posts/${currentPost.id}/reject`, {method: 'POST'});
  const data = await res.json();
  if (data.ok) {
    toast('반려 완료');
    posts = posts.filter(p => p.id !== currentPost.id);
    currentPost = null;
    renderPostList();
    document.getElementById('content-panel').innerHTML = '<div class="placeholder">← 포스트를 선택하세요</div>';
    renderAnalyzePanel();
  } else {
    toast('반려 실패: ' + data.error, true);
  }
}

// ── AI 분석 탭 ────────────────────────────────────────────
function renderAnalyzePanel() {
  const el = document.getElementById('ai-analyze');
  if (!currentPost) {
    el.innerHTML = '<div class="no-post">포스트를 선택하면<br>분석이 시작됩니다</div>';
    return;
  }
  el.innerHTML = `
    <button class="analyze-btn" id="analyze-btn" onclick="runAnalysis()">🔍 AI 분석 실행</button>
    <div class="analysis-output" id="analysis-output" style="display:none"></div>
  `;
  // 포스트 선택 시 자동 분석 시작
  runAnalysis();
}

async function runAnalysis() {
  if (!currentPost) return;
  const btn = document.getElementById('analyze-btn');
  const out = document.getElementById('analysis-output');
  if (!btn || !out) return;

  btn.disabled = true; btn.textContent = '분석 중...';
  out.style.display = '';
  out.textContent = '';
  out.classList.add('streaming');

  const res = await fetch(`/api/posts/${currentPost.id}/analyze`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({title: currentPost.title, html: currentPost.html || currentPost.naver_html || ''})
  });

  const reader = res.body.getReader();
  const decoder = new TextDecoder();
  let buf = '';

  while (true) {
    const {done, value} = await reader.read();
    if (done) break;
    buf += decoder.decode(value, {stream: true});
    const lines = buf.split('\n');
    buf = lines.pop();
    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      const raw = line.slice(6);
      if (raw === '[DONE]') break;
      try {
        const chunk = JSON.parse(raw);
        if (chunk.text) out.textContent += chunk.text;
        if (chunk.error) { out.textContent = '오류: ' + chunk.error; break; }
      } catch {}
    }
  }

  out.classList.remove('streaming');
  btn.disabled = false; btn.textContent = '🔄 다시 분석';
}

// ── 대화형 수정 탭 ────────────────────────────────────────
function switchAiTab(tab, btn) {
  document.querySelectorAll('.ai-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('ai-analyze').style.display = tab === 'analyze' ? 'flex' : 'none';
  document.getElementById('ai-chat').style.display = tab === 'chat' ? 'flex' : 'none';
}

function chatKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
}

async function sendChat() {
  if (!currentPost || isStreaming) return;
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if (!msg) return;

  input.value = '';
  isStreaming = true;
  document.getElementById('chat-send').disabled = true;

  // 사용자 메시지 표시
  appendChatMsg('user', msg);
  chatHistory.push({role: 'user', content: msg});

  // AI 응답 버블 생성
  const assistantEl = appendChatMsg('assistant', '');
  const bubble = assistantEl.querySelector('.msg-bubble');
  bubble.classList.add('streaming');

  const currentHtml = document.getElementById('html-input')?.value || currentPost.html || '';

  const res = await fetch(`/api/posts/${currentPost.id}/chat`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      message: msg,
      title: currentPost.title,
      html: currentHtml,
      history: chatHistory.slice(-6)
    })
  });

  const reader = res.body.getReader();
  const decoder = new TextDecoder();
  let buf = '';
  let fullText = '';

  while (true) {
    const {done, value} = await reader.read();
    if (done) break;
    buf += decoder.decode(value, {stream: true});
    const lines = buf.split('\n');
    buf = lines.pop();
    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      const raw = line.slice(6);
      if (raw === '[DONE]') break;
      try {
        const chunk = JSON.parse(raw);
        if (chunk.text) { fullText += chunk.text; bubble.innerHTML = renderMd(fullText); }
      } catch {}
    }
  }

  bubble.classList.remove('streaming');
  chatHistory.push({role: 'assistant', content: fullText});

  // HTML 코드블록 감지 → 적용 버튼 표시
  const htmlMatch = fullText.match(/```html\n([\s\S]*?)```/);
  if (htmlMatch) {
    const newHtml = htmlMatch[1];
    const applyBtn = assistantEl.querySelector('.apply-html-btn');
    applyBtn.style.display = '';
    applyBtn.onclick = () => {
      const ta = document.getElementById('html-input');
      if (ta) { ta.value = newHtml; syncPreview(); }
      currentPost.html = newHtml;
      toast('HTML 적용 완료 — 저장 버튼으로 서버에 반영하세요');
      applyBtn.disabled = true; applyBtn.textContent = '적용됨 ✓';
    };
  }

  isStreaming = false;
  document.getElementById('chat-send').disabled = false;
  scrollChat();
}

function appendChatMsg(role, text) {
  const container = document.getElementById('chat-messages');
  // 초기 안내 문구 제거
  const noPost = container.querySelector('.no-post');
  if (noPost) noPost.remove();

  const div = document.createElement('div');
  div.className = `chat-msg ${role}`;
  div.innerHTML = `
    <div class="msg-bubble">${renderMd(text)}</div>
    ${role === 'assistant' ? '<button class="apply-html-btn">HTML 적용</button>' : ''}
  `;
  container.appendChild(div);
  scrollChat();
  return div;
}

function scrollChat() {
  const c = document.getElementById('chat-messages');
  c.scrollTop = c.scrollHeight;
}

// ── 유틸 ─────────────────────────────────────────────────
function renderMd(text) {
  return text
    .replace(/```html\n([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
    .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');
}

function escHtml(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  return (s || '').replace(/"/g, '&quot;');
}

function toast(msg, isErr = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = isErr ? '#2a1a1a' : '#1e1e2e';
  el.style.borderColor = isErr ? '#ff6b6b44' : '#3a3a5a';
  el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 3000);
}

// ── 초기화 ────────────────────────────────────────────────
loadPosts();
</script>
